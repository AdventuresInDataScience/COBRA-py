data:
  path: null
  freq: '1D'
  min_bars: 500
  train_split: 0.7

indicators:
  n_jobs: -1

policy:
  n_entry_rules: 3
  n_exit_rules: 1

backtest:
  init_cash: 10000.0
  fee_rate: 0.001
  slippage: 0.0005
  freq: '1D'

objective:
  name: 'sharpe'
  composite_weights: [0.5, 0.3, 0.1, 0.1]
  complexity_penalty: 0.02
  min_trades: 10

optimiser:
  name: 'dehb'
  budget: 200
  seed: 42
  min_fidelity: 0.2
  max_fidelity: 1.0
  n_workers: 1

validation:
  walk_forward: true
  n_splits: 3
  train_pct: 0.7

output:
  path: './results/'
